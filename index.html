<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="startscreen active">
        <div class="input">
            <input type="text" placeholder="Enter Player1 Name" id="firstplayer">
            <input type="text" placeholder="Enter Player2 Name" id="secondplayer">
        </div>
        <button class="start">Start The Game</button>
    </div>
    <main class="mainscreen">
        <h1>Tic-Tac-Toe</h1>
        <div class="container">
            <div class="game">
                <button class="game-btn"></button>
                <button class="game-btn"></button>
                <button class="game-btn"></button>
                <button class="game-btn"></button>
                <button class="game-btn"></button>
                <button class="game-btn"></button>
                <button class="game-btn"></button>
                <button class="game-btn"></button>
                <button class="game-btn"></button>
            </div>
        </div>
        <button id="reset">Reset The Game</button>
    </main>
    <script type="module" src="script.js"></script>
</body>

</html>
